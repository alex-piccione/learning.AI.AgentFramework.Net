name: Run Tests

on:
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-24.04
    steps:
    - name: 📦 Checkout code
      uses: actions/checkout@v5
  
    - name: ⚙️ Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: 🔄 Restore packages
      run: dotnet restore src/

    - name: 🏗️ Build
      run: dotnet build src/ -c Release --no-restore

    - name: 🧪 Run Tests
      run: |
        dotnet test src/ --no-restore -c Release \
          --filter "TestCategory!=SKIP_ON_DEPLOY" & TestCategory!=REQUIRES_API_KEY" \"